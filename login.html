<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IOCL Officer Club Restaurant — Sign In</title>
    <link rel="stylesheet" href="style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet" />
    <style>
        .login-card {
            animation: heroin .45s ease-out both;
            text-align: center;
        }

        .login-logo h1 {
            font-size: 1.9rem;
            background: var(--amber-grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: .3rem;
        }

        .login-logo p {
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--ink-60);
            margin-bottom: 2rem;
        }

        .form-input {
            text-align: left;
        }

        .login-panel {
            display: none;
        }

        .login-panel.active {
            display: block;
            animation: fadeUp .3s ease-out both;
        }

        .error-msg {
            color: var(--red);
            font-size: .8rem;
            margin-top: .4rem;
            min-height: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <div class="login-card">

            <div class="login-logo">
                <h1>🍽️ IOCL Officer Club</h1>
                <p>Restaurant Management System</p>
            </div>

            <!-- Role Tabs -->
            <div class="login-tabs">
                <button class="login-tab active" id="tabGuest" onclick="switchRole('guest')">👤 Guest Login</button>
                <button class="login-tab" id="tabAdmin" onclick="switchRole('admin')">🛡️ Admin</button>
            </div>

            <!-- USER LOGIN PANEL -->
            <div class="login-panel active" id="userLoginPanel">
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="userMobile" class="form-input" placeholder="+91 XXXXX XXXXX" />
                </div>
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">Password</label>
                    <input type="password" id="userPass" class="form-input" placeholder="••••••••"
                        onkeydown="if(event.key==='Enter')userLogin()" />
                </div>
                <div class="error-msg" id="userLoginError"></div>
                <button onclick="userLogin()" class="btn btn-primary" id="btnUserLogin"
                    style="width:100%;margin-top:.6rem;">
                    Sign In →
                </button>
                <div style="margin-top:1.5rem;font-size:.8rem;color:var(--ink-60);">
                    New here? <a href="#" onclick="switchPanel('register')"
                        style="color:var(--amber-dark);font-weight:700;">Create an account</a>
                </div>
            </div>

            <!-- USER REGISTRATION PANEL -->
            <div class="login-panel" id="registerPanel">
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="regName" class="form-input" placeholder="Your name" />
                </div>
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="regMobile" class="form-input" placeholder="+91 XXXXX XXXXX" />
                </div>
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">Password</label>
                    <input type="password" id="regPass" class="form-input" placeholder="Create a password"
                        onkeydown="if(event.key==='Enter')userRegister()" />
                </div>
                <div class="error-msg" id="registerError"></div>
                <button onclick="userRegister()" class="btn btn-primary" id="btnRegister"
                    style="width:100%;margin-top:.6rem;">
                    Create Account →
                </button>
                <div style="margin-top:1.5rem;font-size:.8rem;color:var(--ink-60);">
                    Already have an account? <a href="#" onclick="switchPanel('login')"
                        style="color:var(--amber-dark);font-weight:700;">Sign in here</a>
                </div>
            </div>

            <!-- ADMIN PANEL -->
            <div class="login-panel" id="adminPanel">
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">Username</label>
                    <input type="text" id="adminUser" class="form-input" placeholder="admin" autocomplete="username" />
                </div>
                <div class="form-group" style="text-align:left;position:relative;">
                    <label class="form-label">Password</label>
                    <input type="password" id="adminPass" class="form-input" placeholder="••••••••"
                        autocomplete="current-password" onkeydown="if(event.key==='Enter')adminLogin()" />
                </div>
                <div class="error-msg" id="adminError"></div>
                <button onclick="adminLogin()" class="btn btn-primary"
                    style="width:100%;margin-top:.6rem;background:var(--ink);">
                    Admin Login →
                </button>
            </div>

            <footer style="margin-top:2rem;font-size:.72rem;color:var(--ink-60);">&copy; 2026 IOCL Officer Club
                Restaurant</footer>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbxVa7y4qFx9wVVTmON9SIad3h_4GQFsfzVQ68TyN9iTywfu3mvAQOVsOIjkJGXv4YA/exec";
        const SESSION_KEY = "sg_session";
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "admin123";

        // Already logged in?
        if (sessionStorage.getItem(SESSION_KEY)) {
            window.location.replace(
                sessionStorage.getItem(SESSION_KEY) === "admin" ? "admin.html" : "choice.html"
            );
        }

        function switchRole(role) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(role === 'guest' ? 'tabGuest' : 'tabAdmin').classList.add('active');

            if (role === 'guest') {
                document.getElementById('userLoginPanel').classList.add('active');
            } else {
                document.getElementById('adminPanel').classList.add('active');
            }
            clearErrors();
        }

        function switchPanel(panel) {
            document.querySelectorAll('.login-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panel === 'register' ? 'registerPanel' : 'userLoginPanel').classList.add('active');
            clearErrors();
        }

        function clearErrors() {
            document.getElementById('userLoginError').textContent = '';
            document.getElementById('registerError').textContent = '';
            document.getElementById('adminError').textContent = '';
        }

        function userLogin() {
            const mobile = document.getElementById("userMobile").value.trim();
            const pass = document.getElementById("userPass").value;
            const err = document.getElementById("userLoginError");
            const btn = document.getElementById("btnUserLogin");

            if (!mobile || !pass) { err.textContent = "Mobile and Password are required."; return; }

            err.textContent = '';
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            fetch(`${SHEET_URL}?action=login&mobile=${encodeURIComponent(mobile)}&password=${encodeURIComponent(pass)}`)
                .then(r => r.json())
                .then(d => {
                    if (d.success) {
                        sessionStorage.setItem(SESSION_KEY, "guest");
                        sessionStorage.setItem("sg_name", d.name);
                        sessionStorage.setItem("sg_mobile", d.mobile);
                        window.location.href = "choice.html";
                    } else {
                        err.textContent = d.error || "Invalid mobile or password.";
                        btn.disabled = false;
                        btn.textContent = 'Sign In →';
                    }
                })
                .catch(e => {
                    err.textContent = "Network error. Please try again.";
                    btn.disabled = false;
                    btn.textContent = 'Sign In →';
                });
        }

        function userRegister() {
            const name = document.getElementById("regName").value.trim();
            const mobile = document.getElementById("regMobile").value.trim();
            const pass = document.getElementById("regPass").value;
            const err = document.getElementById("registerError");
            const btn = document.getElementById("btnRegister");

            if (!name || !mobile || !pass) { err.textContent = "All fields are required."; return; }

            err.textContent = '';
            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            fetch(`${SHEET_URL}?action=register&name=${encodeURIComponent(name)}&mobile=${encodeURIComponent(mobile)}&password=${encodeURIComponent(pass)}`)
                .then(r => r.json())
                .then(d => {
                    if (d.success) {
                        sessionStorage.setItem(SESSION_KEY, "guest");
                        sessionStorage.setItem("sg_name", d.name);
                        sessionStorage.setItem("sg_mobile", d.mobile);
                        window.location.href = "choice.html";
                    } else {
                        err.textContent = d.error || "Registration failed.";
                        btn.disabled = false;
                        btn.textContent = 'Create Account →';
                    }
                })
                .catch(e => {
                    err.textContent = "Network error. Please try again.";
                    btn.disabled = false;
                    btn.textContent = 'Create Account →';
                });
        }

        function adminLogin() {
            const user = document.getElementById("adminUser").value.trim();
            const pass = document.getElementById("adminPass").value;
            const err = document.getElementById("adminError");
            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                sessionStorage.setItem(SESSION_KEY, "admin");
                sessionStorage.setItem("sg_name", "Admin");
                window.location.href = "admin.html";
            } else {
                err.textContent = "Invalid username or password.";
                document.getElementById("adminPass").value = '';
                document.getElementById("adminPass").focus();
            }
        }
    </script>
</body>

</html>
