<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IOCL Officer Club Restaurant — Sign In</title>
    <link rel="stylesheet" href="style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet" />
    <style>
        .login-card {
            animation: heroin .45s ease-out both;
            text-align: center;
        }

        .login-logo h1 {
            font-size: 1.9rem;
            background: var(--amber-grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: .3rem;
        }

        .login-logo p {
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--ink-60);
            margin-bottom: 2rem;
        }

        .form-input {
            text-align: left;
        }

        .login-panel {
            display: none;
        }

        .login-panel.active {
            display: block;
            animation: fadeUp .3s ease-out both;
        }

        .error-msg {
            color: var(--red);
            font-size: .8rem;
            margin-top: .4rem;
            min-height: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <div class="login-card">

            <div class="login-logo">
                <h1>🍽️ IOCL Officer Club</h1>
                <p>Restaurant Management System</p>
            </div>

            <!-- Role Tabs -->
            <div class="login-tabs">
                <button class="login-tab active" id="tabGuest" onclick="switchRole('guest')">👤 Guest Login</button>
                <button class="login-tab" id="tabAdmin" onclick="switchRole('admin')">🛡️ Admin</button>
            </div>

            <!-- GUEST PANEL -->
            <div class="login-panel active" id="guestPanel">
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="guestName" class="form-input" placeholder="Your name" />
                </div>
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">Mobile Number</label>
                    <input type="tel" id="guestMobile" class="form-input" placeholder="+91 XXXXX XXXXX" />
                </div>
                <div class="error-msg" id="guestError"></div>
                <button onclick="guestLogin()" class="btn btn-primary" style="width:100%;margin-top:.6rem;">
                    Continue →
                </button>
            </div>

            <!-- ADMIN PANEL -->
            <div class="login-panel" id="adminPanel">
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">Username</label>
                    <input type="text" id="adminUser" class="form-input" placeholder="admin" autocomplete="username" />
                </div>
                <div class="form-group" style="text-align:left;position:relative;">
                    <label class="form-label">Password</label>
                    <input type="password" id="adminPass" class="form-input" placeholder="••••••••"
                        autocomplete="current-password" onkeydown="if(event.key==='Enter')adminLogin()" />
                </div>
                <div class="error-msg" id="adminError"></div>
                <button onclick="adminLogin()" class="btn btn-primary"
                    style="width:100%;margin-top:.6rem;background:var(--ink);">
                    Sign In →
                </button>
            </div>

            <footer style="margin-top:2rem;font-size:.72rem;color:var(--ink-60);">&copy; 2026 IOCL Officer Club
                Restaurant</footer>
        </div>
    </div>

    <script>
        const SESSION_KEY = "sg_session";
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "admin123";

        // Already logged in?
        if (sessionStorage.getItem(SESSION_KEY)) {
            window.location.replace(
                sessionStorage.getItem(SESSION_KEY) === "admin" ? "admin.html" : "choice.html"
            );
        }

        function switchRole(role) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(role === 'guest' ? 'tabGuest' : 'tabAdmin').classList.add('active');
            document.getElementById(role === 'guest' ? 'guestPanel' : 'adminPanel').classList.add('active');
            document.getElementById(role === 'guest' ? 'guestError' : 'adminError').textContent = '';
        }

        function guestLogin() {
            const name = document.getElementById("guestName").value.trim();
            const mobile = document.getElementById("guestMobile").value.trim();
            const err = document.getElementById("guestError");
            if (!name) { err.textContent = "Please enter your name."; return; }
            if (!mobile) { err.textContent = "Please enter your mobile number."; return; }
            err.textContent = '';
            sessionStorage.setItem(SESSION_KEY, "guest");
            sessionStorage.setItem("sg_name", name);
            sessionStorage.setItem("sg_mobile", mobile);
            window.location.href = "choice.html";
        }

        function adminLogin() {
            const user = document.getElementById("adminUser").value.trim();
            const pass = document.getElementById("adminPass").value;
            const err = document.getElementById("adminError");
            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                sessionStorage.setItem(SESSION_KEY, "admin");
                sessionStorage.setItem("sg_name", "Admin");
                window.location.href = "admin.html";
            } else {
                err.textContent = "Invalid username or password.";
                document.getElementById("adminPass").value = '';
                document.getElementById("adminPass").focus();
            }
        }
    </script>
</body>

</html>
